<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Phishing URL Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Проверка URL на фишинг</h1>
        <input type="text" id="urlInput" placeholder="Введите URL">
        <button onclick="checkURL()">Проверить</button>
        <p id="result"></p>
    </div>

    <script>
        async function checkURL() {
            const url = document.getElementById("urlInput").value;
            const response = await fetch("/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({url: url})
            });
            const data = await response.json();
            const resText = data.phishing ? "🚨 Фишинговый сайт!" : "✅ Безопасный сайт";
            document.getElementById("result").innerText = resText;
        }
    </script>
</body>
</html>
